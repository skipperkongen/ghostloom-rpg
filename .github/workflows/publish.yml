name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ghostloom
          POSTGRES_PASSWORD: ghostloom
          POSTGRES_DB: ghostloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ghostloom -d ghostloom_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        env:
          TEST_DATABASE_URL: postgresql+psycopg://ghostloom:ghostloom@localhost:5432/ghostloom_test
          DATABASE_URL: postgresql+psycopg://ghostloom:ghostloom@localhost:5432/ghostloom_test
          SESSION_SECRET: test-session-secret
          BYOK_ENCRYPTION_KEY: fxFj0jB_v0iFhf_5d662sUscTLtMFYss44nNdinqNGI=
        run: uv run pytest -q

  publish:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghostloom-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ghostloom-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghostloom-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ghostloom-web:latest
